<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shopping Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;
  --surface:#ffffff;
  --border:#e4e0d8;
  --ink:#1c1a17;
  --muted:#9a9285;
  --muted2:#c8c2b8;
  --accent:#d4420a;
  --accent2:#f5a623;
  --green:#2a7a4b;
  --green-bg:#edf7f1;
  --green-text:#2a7a4b;
  --sidebar-bg:#1c1a17;
  --sidebar-text:#f5f3ef;
  --sidebar-muted:#6b6560;
  --sidebar-active:#d4420a;
}
body{background:var(--bg);color:var(--ink);font-family:'Mulish',sans-serif;min-height:100vh}

.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid #2e2c28}
.logo-eyebrow{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--sidebar-muted);margin-bottom:6px}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.04em;color:var(--sidebar-text);line-height:1}
.logo-name em{color:var(--accent);font-style:normal}

.budget-panel{margin:16px 14px;background:#252320;border-radius:10px;padding:14px 16px}
.bp-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--sidebar-muted);margin-bottom:6px}
.bp-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent2);line-height:1}
.bp-row{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--sidebar-muted)}
.bp-track{height:3px;background:#3a3730;border-radius:2px;margin-top:10px}
.bp-fill{height:3px;background:var(--accent2);border-radius:2px;transition:width .5s ease}

.nav-section{padding:16px 0 4px}
.nav-heading{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--sidebar-muted);padding:0 24px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 24px;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:var(--sidebar-muted);font-family:'Mulish',sans-serif;font-size:13px;transition:color .15s,background .15s;position:relative}
.nav-item:hover{background:#252320;color:var(--sidebar-text)}
.nav-item.active{color:var(--sidebar-text);background:#252320}
.nav-item.active::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:2px 0 0 2px}
.nav-icon{width:22px;text-align:center;font-size:15px;flex-shrink:0}
.nav-label{flex:1}
.nav-count{font-size:10px;background:#3a3730;color:var(--sidebar-muted);border-radius:20px;padding:2px 8px;font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em}
.nav-item.active .nav-count{background:var(--accent);color:#fff}

/* MAIN */
.main{display:flex;flex-direction:column;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.page-heading{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.04em;color:var(--ink);flex:1}
.page-heading span{color:var(--accent)}
.sort-group{display:flex;gap:6px}
.sort-pill{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;font-family:'Mulish',sans-serif;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.sort-pill:hover{border-color:var(--muted2);color:var(--ink)}
.sort-pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ADD FORM */
.form-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 32px}
.form-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:0.04em;user-select:none}
.form-toggle .toggle-icon{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;transition:transform .2s}
.form-toggle.open .toggle-icon{transform:rotate(45deg)}
.form-body{display:none;margin-top:18px;animation:fadeSlide .2s ease}
.form-body.open{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;align-items:end}
.form-col{display:flex;flex-direction:column;gap:5px}
.form-col.full{grid-column:1/-1}
.f-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
input[type=text],input[type=url],input[type=number],select{
  background:var(--bg);border:1.5px solid var(--border);border-radius:8px;
  padding:9px 12px;font-family:'Mulish',sans-serif;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .2s;width:100%
}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted2)}
select option{background:#fff}
.price-inp{position:relative}
.price-inp::before{content:'₹';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.price-inp input{padding-left:24px}
.form-actions-row{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-family:'Mulish',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:0.03em}
.btn-primary:hover{background:#c03a08;transform:translateY(-1px)}
.btn-secondary{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:10px 16px;font-family:'Mulish',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.btn-secondary:hover{border-color:var(--muted2);color:var(--ink)}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat-cell{background:var(--surface);padding:14px 24px}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.04em;line-height:1}
.stat-n.orange{color:var(--accent)}
.stat-n.green{color:var(--green)}
.stat-lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* CATALOG GRID */
.catalog{padding:24px 32px 60px;flex:1}
.cat-section{margin-bottom:40px}
.cat-section-title{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cat-section-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--ink)}
.cat-section-line{flex:1;height:1px;background:var(--border)}
.cat-section-count{font-size:11px;color:var(--muted);letter-spacing:0.08em}

.cards-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}

/* PRODUCT CARD */
.pcard{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;animation:cardIn .25s ease;cursor:default;position:relative}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:none}}
.pcard:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.1);border-color:var(--muted2)}
.pcard.bought{border-color:#b8dfc8;background:#fafffe}

/* Image */
.pcard-img{position:relative;height:180px;background:#f0ede6;overflow:hidden}
.pcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;display:block}
.pcard:hover .pcard-img img{transform:scale(1.05)}
.pcard-img .img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted2)}
.pcard-img .img-placeholder .ph-icon{font-size:36px;opacity:0.4}
.pcard-img .img-placeholder .ph-text{font-size:10px;letter-spacing:0.1em;text-transform:uppercase}
.img-loading{position:absolute;inset:0;background:#f0ede6;display:flex;align-items:center;justify-content:center}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Priority ribbon */
.priority-ribbon{position:absolute;top:10px;left:10px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:20px}
.pr-high{background:#fde8e2;color:#c0300a}
.pr-mid{background:#fef3d8;color:#9a6a00}
.pr-low{background:#e8f5ee;color:#2a7a4b}

.bought-ribbon{position:absolute;top:10px;right:10px;background:var(--green);color:#fff;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:20px}

/* Card body */
.pcard-body{padding:12px 14px 14px}
.pcard-cat{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:600}
.pcard-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pcard.bought .pcard-name{text-decoration:line-through;color:var(--muted)}
.pcard-note{font-size:11px;color:var(--muted);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.pcard-footer{display:flex;align-items:center;justify-content:space-between;gap:6px}
.pcard-price{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.04em;color:var(--accent)}
.pcard.bought .pcard-price{color:var(--green)}

.pcard-actions{display:flex;gap:5px}
.pa-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);transition:all .15s;flex-shrink:0}
.pa-btn:hover{border-color:var(--muted2);color:var(--ink)}
.pa-btn.buy:hover{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.pa-btn.del:hover{background:#fde8e2;border-color:#e88080;color:var(--accent)}
.pa-link{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);transition:all .15s;text-decoration:none;flex-shrink:0}
.pa-link:hover{border-color:var(--accent);color:var(--accent)}

.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.es-icon{font-size:56px;margin-bottom:16px;opacity:0.25}
.es-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.06em;color:var(--muted2);margin-bottom:6px}
.es-sub{font-size:13px}

@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;padding:12px;gap:6px;overflow-x:auto}
  .sidebar-logo{border:none;padding:4px 10px}
  .budget-panel{margin:4px;padding:8px 12px;flex-shrink:0}
  .nav-section{display:contents}
  .nav-heading{display:none}
  .nav-item{border-radius:20px;padding:5px 12px;border:1px solid #3a3730}
  .nav-item.active::after{display:none}
  .topbar{padding:12px 16px}
  .form-panel{padding:14px 16px}
  .catalog{padding:16px 16px 60px}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-eyebrow">My personal</div>
    <div class="logo-name">SHOP<em>LIST</em></div>
  </div>

  <div class="budget-panel">
    <div class="bp-label">Total catalog value</div>
    <div class="bp-val" id="bp-val">₹0</div>
    <div class="bp-row"><span id="bp-spent">₹0 spent</span><span id="bp-pct">0%</span></div>
    <div class="bp-track"><div class="bp-fill" id="bp-fill" style="width:0%"></div></div>
  </div>

  <div class="nav-section">
    <div class="nav-heading">View</div>
    <button class="nav-item active" onclick="setFilter('All',this)">
      <span class="nav-icon">▦</span><span class="nav-label">All Items</span><span class="nav-count" id="nc-All">0</span>
    </button>
    <button class="nav-item" onclick="setFilter('Pending',this)">
      <span class="nav-icon">◯</span><span class="nav-label">Pending</span><span class="nav-count" id="nc-Pending">0</span>
    </button>
    <button class="nav-item" onclick="setFilter('Bought',this)">
      <span class="nav-icon">✓</span><span class="nav-label">Bought</span><span class="nav-count" id="nc-Bought">0</span>
    </button>
  </div>

  <div class="nav-section">
    <div class="nav-heading">Categories</div>
    <button class="nav-item" onclick="setFilter('Clothing',this)"><span class="nav-icon">👕</span><span class="nav-label">Clothing</span><span class="nav-count" id="nc-Clothing">0</span></button>
    <button class="nav-item" onclick="setFilter('Electronics',this)"><span class="nav-icon">📱</span><span class="nav-label">Electronics</span><span class="nav-count" id="nc-Electronics">0</span></button>
    <button class="nav-item" onclick="setFilter('Books',this)"><span class="nav-icon">📚</span><span class="nav-label">Books</span><span class="nav-count" id="nc-Books">0</span></button>
    <button class="nav-item" onclick="setFilter('Footwear',this)"><span class="nav-icon">👟</span><span class="nav-label">Footwear</span><span class="nav-count" id="nc-Footwear">0</span></button>
    <button class="nav-item" onclick="setFilter('Accessories',this)"><span class="nav-icon">🎒</span><span class="nav-label">Accessories</span><span class="nav-count" id="nc-Accessories">0</span></button>
    <button class="nav-item" onclick="setFilter('Health',this)"><span class="nav-icon">💊</span><span class="nav-label">Health</span><span class="nav-count" id="nc-Health">0</span></button>
    <button class="nav-item" onclick="setFilter('Food',this)"><span class="nav-icon">🍜</span><span class="nav-label">Food</span><span class="nav-count" id="nc-Food">0</span></button>
    <button class="nav-item" onclick="setFilter('Appliances',this)"><span class="nav-icon">🏠</span><span class="nav-label">Appliances</span><span class="nav-count" id="nc-Appliances">0</span></button>
    <button class="nav-item" onclick="setFilter('Other',this)"><span class="nav-icon">⭐</span><span class="nav-label">Other</span><span class="nav-count" id="nc-Other">0</span></button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div class="page-heading" id="pg-heading">ALL <span>ITEMS</span></div>
    <div class="sort-group">
      <button class="sort-pill active" onclick="setSort('date',this)">Latest</button>
      <button class="sort-pill" onclick="setSort('price-asc',this)">Price ↑</button>
      <button class="sort-pill" onclick="setSort('price-desc',this)">Price ↓</button>
      <button class="sort-pill" onclick="setSort('priority',this)">Priority</button>
    </div>
  </div>

  <!-- Add form -->
  <div class="form-panel">
    <div class="form-toggle" id="form-toggle" onclick="toggleForm()">
      <div class="toggle-icon">+</div>
      <span>Add new item to catalog</span>
    </div>
    <div class="form-body" id="form-body">
      <div class="form-grid">
        <div class="form-col">
          <div class="f-label">Item name *</div>
          <input type="text" id="f-name" placeholder="e.g. Nike Air Max, OnePlus 12, Levi's 511…" />
        </div>
        <div class="form-col">
          <div class="f-label">Category</div>
          <select id="f-cat">
            <option>Clothing</option><option>Electronics</option><option>Books</option>
            <option>Footwear</option><option>Accessories</option><option>Health</option>
            <option>Food</option><option>Appliances</option><option>Other</option>
          </select>
        </div>
        <div class="form-col">
          <div class="f-label">Price (₹)</div>
          <div class="price-inp"><input type="number" id="f-price" placeholder="0" min="0" /></div>
        </div>
        <div class="form-col">
          <div class="f-label">Priority</div>
          <select id="f-priority">
            <option value="high">🔴 Must have</option>
            <option value="mid" selected>🟡 Want it</option>
            <option value="low">🟢 Someday</option>
          </select>
        </div>
        <div class="form-col" style="grid-column:1/3">
          <div class="f-label">Buy link (Myntra / Amazon / Flipkart)</div>
          <input type="url" id="f-link" placeholder="https://…" />
        </div>
        <div class="form-col">
          <div class="f-label">Note (size, color…)</div>
          <input type="text" id="f-note" placeholder="e.g. Size 32, Olive green" />
        </div>
        <div class="form-col">
          <div class="f-label">Custom image URL (optional)</div>
          <input type="url" id="f-img" placeholder="Leave blank for auto image" />
        </div>
      </div>
      <div class="form-actions-row">
        <button class="btn-secondary" onclick="clearForm()">Clear</button>
        <button class="btn-primary" onclick="addItem()">+ Add to Catalog</button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-cell"><div class="stat-n orange" id="st-total">0</div><div class="stat-lbl">Items</div></div>
    <div class="stat-cell"><div class="stat-n green" id="st-bought">0</div><div class="stat-lbl">Bought</div></div>
    <div class="stat-cell"><div class="stat-n orange" id="st-value">₹0</div><div class="stat-lbl">Total value</div></div>
    <div class="stat-cell"><div class="stat-n" id="st-spent">₹0</div><div class="stat-lbl">Spent</div></div>
  </div>

  <!-- Catalog -->
  <div class="catalog" id="catalog"></div>
</div>
</div>

<script>
const CATS = ['Clothing','Electronics','Books','Footwear','Accessories','Health','Food','Appliances','Other'];
const CAT_ICONS = {Clothing:'👕',Electronics:'📱',Books:'📚',Footwear:'👟',Accessories:'🎒',Health:'💊',Food:'🍜',Appliances:'🏠',Other:'⭐'};

// Unsplash source for automatic images — uses item name + category as query
function getImageUrl(name, cat) {
  const q = encodeURIComponent(name + ' ' + cat);
  // Use Unsplash source which reliably serves images without API key
  return `https://source.unsplash.com/400x300/?${q}`;
}

let items = JSON.parse(localStorage.getItem('shoplist_v3') || '[]');
let currentFilter = 'All';
let currentSort   = 'date';
let formOpen = false;

function save(){ localStorage.setItem('shoplist_v3', JSON.stringify(items)); }
function fmt(n){ return '₹' + Number(n||0).toLocaleString('en-IN'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleForm(){
  formOpen = !formOpen;
  document.getElementById('form-body').classList.toggle('open', formOpen);
  document.getElementById('form-toggle').classList.toggle('open', formOpen);
}

function addItem(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('f-name').focus(); return; }
  const price    = parseFloat(document.getElementById('f-price').value)||0;
  const link     = document.getElementById('f-link').value.trim();
  const cat      = document.getElementById('f-cat').value;
  const priority = document.getElementById('f-priority').value;
  const note     = document.getElementById('f-note').value.trim();
  const customImg= document.getElementById('f-img').value.trim();
  const imgUrl   = customImg || getImageUrl(name, cat);

  items.unshift({ id:Date.now(), name, price, link, cat, priority, note, imgUrl, bought:false, date:Date.now() });
  save(); clearForm(); render();
  // close form
  formOpen = true; toggleForm();
}

function clearForm(){
  ['f-name','f-price','f-link','f-note','f-img'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-priority').value='mid';
}

function toggleBought(id){
  const it = items.find(i=>i.id===id);
  if(it){ it.bought=!it.bought; save(); render(); }
}

function deleteItem(id){
  if(!confirm('Remove this item from your catalog?')) return;
  items = items.filter(i=>i.id!==id);
  save(); render();
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const label = f==='All'?'ALL <span>ITEMS</span>': f.toUpperCase().replace(/(\s\S+)$/,' <span>$&</span>');
  document.getElementById('pg-heading').innerHTML = `${f.toUpperCase()} <span>▸</span>`;
  render();
}

function setSort(s, btn){
  currentSort = s;
  document.querySelectorAll('.sort-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered(){
  let list = [...items];
  if(currentFilter==='Pending')      list = list.filter(i=>!i.bought);
  else if(currentFilter==='Bought')  list = list.filter(i=>i.bought);
  else if(CATS.includes(currentFilter)) list = list.filter(i=>i.cat===currentFilter);

  if(currentSort==='price-asc')   list.sort((a,b)=>a.price-b.price);
  else if(currentSort==='price-desc') list.sort((a,b)=>b.price-a.price);
  else if(currentSort==='priority'){
    const r={high:0,mid:1,low:2};
    list.sort((a,b)=>r[a.priority]-r[b.priority]);
  } else list.sort((a,b)=>b.date-a.date);
  return list;
}

// Group by category for catalog view
function groupBy(list, key){ 
  return list.reduce((acc, item)=>{ (acc[item[key]]||(acc[item[key]]=[])).push(item); return acc; },{});
}

function priLabel(p){ return {high:'Must have',mid:'Want it',low:'Someday'}[p]||''; }
function priClass(p){ return {high:'pr-high',mid:'pr-mid',low:'pr-low'}[p]||''; }

function renderCard(it){
  const imgEl = `
    <div class="pcard-img">
      <div class="img-loading" id="imgload-${it.id}"><div class="spinner"></div></div>
      <img src="${esc(it.imgUrl)}" alt="${esc(it.name)}"
        onload="document.getElementById('imgload-${it.id}').style.display='none'"
        onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><div class=\\'ph-icon\\'>${CAT_ICONS[it.cat]||'📦'}</div><div class=\\'ph-text\\'>${esc(it.cat)}</div></div>'"
      />
      <div class="priority-ribbon ${priClass(it.priority)}">${priLabel(it.priority)}</div>
      ${it.bought ? '<div class="bought-ribbon">✓ Bought</div>' : ''}
    </div>`;

  return `
    <div class="pcard ${it.bought?'bought':''}" id="pc-${it.id}">
      ${imgEl}
      <div class="pcard-body">
        <div class="pcard-cat">${esc(it.cat)}</div>
        <div class="pcard-name">${esc(it.name)}</div>
        ${it.note ? `<div class="pcard-note">${esc(it.note)}</div>` : ''}
        <div class="pcard-footer">
          <div class="pcard-price">${it.price ? fmt(it.price) : '—'}</div>
          <div class="pcard-actions">
            ${it.link ? `<a class="pa-link" href="${esc(it.link)}" target="_blank" rel="noopener" title="Buy now">↗</a>` : ''}
            <button class="pa-btn buy" onclick="toggleBought(${it.id})" title="${it.bought?'Mark pending':'Mark bought'}">${it.bought?'↩':'✓'}</button>
            <button class="pa-btn del" onclick="deleteItem(${it.id})" title="Remove">✕</button>
          </div>
        </div>
      </div>
    </div>`;
}

function render(){
  const total    = items.length;
  const bought   = items.filter(i=>i.bought).length;
  const totalVal = items.reduce((s,i)=>s+(i.price||0),0);
  const spentVal = items.filter(i=>i.bought).reduce((s,i)=>s+(i.price||0),0);
  const pct      = totalVal ? Math.round((spentVal/totalVal)*100) : 0;

  // sidebar counts
  const allFilters = ['All','Pending','Bought',...CATS];
  allFilters.forEach(c=>{
    const el = document.getElementById('nc-'+c);
    if(!el) return;
    if(c==='All')     el.textContent = total;
    else if(c==='Pending') el.textContent = items.filter(i=>!i.bought).length;
    else if(c==='Bought')  el.textContent = bought;
    else el.textContent = items.filter(i=>i.cat===c).length;
  });

  document.getElementById('bp-val').textContent   = fmt(totalVal);
  document.getElementById('bp-spent').textContent = fmt(spentVal)+' spent';
  document.getElementById('bp-pct').textContent   = pct+'%';
  document.getElementById('bp-fill').style.width  = pct+'%';

  document.getElementById('st-total').textContent  = total;
  document.getElementById('st-bought').textContent = bought;
  document.getElementById('st-value').textContent  = fmt(totalVal);
  document.getElementById('st-spent').textContent  = fmt(spentVal);

  const filtered = getFiltered();
  const catalog  = document.getElementById('catalog');

  if(!filtered.length){
    catalog.innerHTML = `<div class="empty-state">
      <div class="es-icon">🛍</div>
      <div class="es-title">${items.length ? 'Nothing here yet' : 'Your catalog is empty'}</div>
      <div class="es-sub">${items.length ? 'Try a different filter.' : 'Click "+ Add new item" above to start building your catalog.'}</div>
    </div>`;
    return;
  }

  // If filtering by a specific category or pending/bought → single flat grid
  const singleView = currentFilter !== 'All';
  if(singleView){
    catalog.innerHTML = `<div class="cards-row">${filtered.map(renderCard).join('')}</div>`;
    return;
  }

  // All view → group by category, show sections
  const grouped = groupBy(filtered, 'cat');
  const orderedCats = CATS.filter(c => grouped[c] && grouped[c].length > 0);

  catalog.innerHTML = orderedCats.map(cat => `
    <div class="cat-section">
      <div class="cat-section-title">
        <span style="font-size:20px">${CAT_ICONS[cat]||'📦'}</span>
        <span class="cat-section-name">${cat.toUpperCase()}</span>
        <div class="cat-section-line"></div>
        <span class="cat-section-count">${grouped[cat].length} item${grouped[cat].length!==1?'s':''}</span>
      </div>
      <div class="cards-row">${grouped[cat].map(renderCard).join('')}</div>
    </div>
  `).join('');
}

document.getElementById('f-name').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });
render();
</script>
</body>
</html>
